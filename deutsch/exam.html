<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goethe A2 Exam - Index</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f0f1a; color: #e0e0e0; }

        .top-bar {
            background: #1a1a2e; padding: 1rem 2rem; border-bottom: 2px solid #16213e;
            position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
        }
        .top-bar h1 { color: #e94560; font-size: 1.3rem; }
        .top-bar a { color: #888; text-decoration: none; font-size: 0.9rem; }
        .top-bar a:hover { color: #e94560; }

        .container { max-width: 1000px; margin: 0 auto; padding: 1rem; }

        .intro {
            background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px;
            padding: 1.2rem 1.5rem; margin-bottom: 1.5rem;
        }
        .intro h2 { color: #e94560; font-size: 1.3rem; margin-bottom: 0.5rem; }
        .intro p { color: #aaa; font-size: 0.9rem; line-height: 1.5; }

        .skill-section {
            margin-top: 2rem;
        }
        .skill-header {
            color: #e94560; font-size: 1.4rem; font-weight: 700;
            padding-bottom: 0.5rem; border-bottom: 2px solid #e94560;
            margin-bottom: 1rem;
        }

        .part-block {
            background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 10px;
            padding: 1rem 1.5rem; margin: 1rem 0;
        }
        .part-title {
            color: #ff9800; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.3rem;
        }
        .part-desc { color: #888; font-size: 0.85rem; margin-bottom: 0.8rem; }

        .question-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.6rem;
        }
        .question-card {
            background: #12121e; border: 1px solid #2a2a3e; border-radius: 8px;
            padding: 0.8rem 1rem; cursor: pointer; transition: all 0.2s;
            text-decoration: none; color: inherit; display: block;
        }
        .question-card:hover {
            border-color: #e94560; transform: translateY(-2px);
            background: #1a1a3e;
        }
        .q-num {
            color: #e94560; font-weight: 700; font-size: 0.85rem;
            display: inline-block; background: #2a1a2e; padding: 0.15rem 0.5rem;
            border-radius: 4px; margin-bottom: 0.4rem;
        }
        .q-title-de { color: #fff; font-size: 0.95rem; font-weight: 500; line-height: 1.3; }
        .q-title-ko { color: #888; font-size: 0.85rem; margin-top: 0.2rem; }

        .vocab-link-card {
            background: linear-gradient(135deg, #1a3a5c, #1a1a3e);
            border: 1px solid #64b5f6; border-radius: 10px;
            padding: 1rem 1.5rem; margin: 1rem 0;
            text-decoration: none; color: inherit; display: block;
            transition: transform 0.2s;
        }
        .vocab-link-card:hover { transform: translateY(-2px); border-color: #ff9800; }
        .vocab-link-card h3 { color: #ff9800; font-size: 1.1rem; }
        .vocab-link-card p { color: #aaa; font-size: 0.85rem; margin-top: 0.3rem; }

        @media (max-width: 600px) {
            .container { padding: 0.5rem; }
            .question-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <a href="index.html">&larr; Back to app</a>
    <h1>Goethe A2 Exam — Index</h1>
</div>

<div class="container">
    <div class="intro">
        <h2>📋 실전 시험 시뮬레이션</h2>
        <p>Goethe-Zertifikat A2의 Schreiben(쓰기)과 Sprechen(말하기) 파트를 실전 형식으로 연습합니다.<br>
        각 문제를 클릭하면 상세 페이지로 이동하여 시험 상황, 모범 답안, 변형 예시, Tipps를 한눈에 볼 수 있어요.</p>
    </div>

    <a href="exam_vocab.html" class="vocab-link-card">
        <h3>📚 Prüfungswortschatz (시험 빈출 어휘)</h3>
        <p>Goethe A2 시험에서 자주 등장하는 핵심 어휘/표현 200+개 (인사, 시간/날짜, 의문사, 전치사, 동사 등)</p>
    </a>

    <div id="content"></div>
</div>

<script src="js/data_exam.js"></script>
<script>
    function render() {
        let html = "";

        // Schreiben
        html += `<div class="skill-section">`;
        html += `<div class="skill-header">📝 Schreiben (쓰기)</div>`;
        for (const part of EXAM_DATA.schreiben.parts) {
            html += `<div class="part-block">`;
            html += `<div class="part-title">${part.part} — ${part.title_de}</div>`;
            html += `<div class="part-desc">${part.title_ko} · ${part.description_ko}</div>`;
            html += `<div class="question-grid">`;
            for (let i = 0; i < part.examples.length; i++) {
                const ex = part.examples[i];
                html += `<a href="exam_question.html?skill=schreiben&part=${encodeURIComponent(part.part)}&id=${ex.id}" class="question-card">`;
                html += `<span class="q-num">Q${i + 1}</span>`;
                html += `<div class="q-title-de">${ex.title_ko}</div>`;
                html += `</a>`;
            }
            html += `</div></div>`;
        }
        html += `</div>`;

        // Sprechen
        html += `<div class="skill-section">`;
        html += `<div class="skill-header">🗣 Sprechen (말하기)</div>`;
        for (const part of EXAM_DATA.sprechen.parts) {
            html += `<div class="part-block">`;
            html += `<div class="part-title">${part.part} — ${part.title_de}</div>`;
            html += `<div class="part-desc">${part.title_ko} · ${part.description_ko}</div>`;
            html += `<div class="question-grid">`;
            for (let i = 0; i < part.examples.length; i++) {
                const ex = part.examples[i];
                let title = "";
                if (part.part === "Teil 1") title = `${ex.keyword} (${ex.keyword_ko})`;
                else if (part.part === "Teil 2") title = ex.topic_ko;
                else title = ex.scenario_ko;
                html += `<a href="exam_question.html?skill=sprechen&part=${encodeURIComponent(part.part)}&id=${ex.id}" class="question-card">`;
                html += `<span class="q-num">Q${i + 1}</span>`;
                html += `<div class="q-title-de">${title}</div>`;
                html += `</a>`;
            }
            html += `</div></div>`;
        }
        html += `</div>`;

        document.getElementById("content").innerHTML = html;
    }
    render();
</script>
</body>
</html>
